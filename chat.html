<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Chat Application</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- WebSocket Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.2.0/bundles/stomp.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>
</head>

<body>
<div class="container mt-4">
    <h2 class="text-center mb-4">Real-Time Chat Application</h2>


    <div id="chat"
         class="border rounded p-3 mb-3"
         style="height: 300px; overflow-y: auto;">
    </div>

    <div class="input-group mb-3">
        <input id="senderInput" type="text" class="form-control"
               placeholder="Enter your name">
    </div>


    <div class="input-group mb-3">
        <input id="messageInput" type="text" class="form-control"
               placeholder="Type your message...">
        <button id="send-button" class="btn btn-primary">Send</button>
    </div>
</div>

<script>
    let stompClient = null;


    function connect() {
        const socket = new SockJS('/chat');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            console.log("Connected: " + frame);


            stompClient.subscribe('/topic/messages', function (message) {
                showMessage(JSON.parse(message.body));
            });
        });
    }


    function showMessage(message) {
        const chat = document.getElementById('chat');
        const messageElement = document.createElement('div');

        messageElement.textContent = message.sender + " : " + message.content;
        messageElement.className = "border-bottom mb-1 p-1";

        chat.appendChild(messageElement);
        chat.scrollTop = chat.scrollHeight;
    }


    function sendMessage() {
        console.log("Send button clicked");

        if (!stompClient) {
            alert("Not connected to server!");
            return;
        }

        const sender = document.getElementById('senderInput').value;
        const content = document.getElementById('messageInput').value;

        if (sender === "" || content === "") {
            alert("Please enter name and message");
            return;
        }

        const chatMessage = {
            sender: sender,
            content: content
        };


        stompClient.send("/app/sendMessage", {}, JSON.stringify(chatMessage));


        document.getElementById('messageInput').value = "";
    }


    document.getElementById('send-button')
            .addEventListener('click', sendMessage);


    window.onload = connect;
</script>

</body>
</html>
